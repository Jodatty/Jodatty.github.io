<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Free Estimate | Lincoln Shower Door of Charlotte</title>
<meta name="description" content="Request a free estimate from Lincoln Shower Door of Charlotte. Send a photo of your project and we'll follow up with a sample plan and pricing.">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',Arial,sans-serif;background:#faf8f4;color:#1a1a1a;line-height:1.7}
nav{background:#0a1628;padding:14px 32px;display:flex;justify-content:space-between;align-items:center}
nav img{height:78px;display:block;border-radius:3px}
nav a{color:#ccc;text-decoration:none;font-size:0.82rem;font-weight:500;text-transform:uppercase}
.wrap{max-width:640px;margin:0 auto;padding:56px 24px}
h1{font-family:Georgia,serif;font-size:1.9rem;color:#0a1628;margin-bottom:10px}
.wrap>p{color:#555;margin-bottom:28px}
label{display:block;font-weight:600;font-size:0.85rem;color:#0a1628;margin-bottom:6px;margin-top:18px}
input,textarea,select{width:100%;padding:12px;border:1px solid #e0ddd8;border-radius:4px;font-family:inherit;font-size:0.95rem}
textarea{min-height:110px;resize:vertical}
.saved-picks{background:#fff;border:1px solid #e0ddd8;border-radius:6px;padding:16px 18px;margin-top:20px;display:none}
.saved-picks.show{display:block}
.saved-picks h3{font-size:0.9rem;color:#0a1628;margin-bottom:8px}
.saved-picks ul{list-style:none;font-size:0.85rem;color:#555}
.saved-picks li{margin-bottom:6px;padding-left:14px;position:relative}
.saved-picks li::before{content:'\2665';position:absolute;left:0;color:#BF0A30;font-size:11px;top:3px}
button{margin-top:26px;background:#b87333;color:#fff;border:none;padding:16px 44px;font-weight:700;font-size:0.95rem;letter-spacing:.04em;text-transform:uppercase;border-radius:2px;cursor:pointer;width:100%}
button:hover{background:#d4956a}
.alt{text-align:center;margin-top:20px;font-size:0.85rem;color:#667}
.alt a{color:#b87333;font-weight:600;text-decoration:none}
</style>
</head>
<body>
<nav>
  <img src="lincoln-shower-door-logo.svg" alt="Lincoln Shower Door of Charlotte logo">
  <a href="index.html">&larr; Back to homepage</a>
</nav>
<div class="wrap">
  <h1>Request a Free Estimate</h1>
  <p>Send us a few details and a photo of your space. We&rsquo;ll follow up with a sample plan and pricing &mdash; no showroom visit required.</p>

  <div class="saved-picks" id="savedPicks">
    <h3>Styles you&rsquo;ve liked on our site:</h3>
    <ul id="savedPicksList"></ul>
  </div>

  <div class="saved-picks" id="hardwarePrefs">
    <h3>Your hardware preferences:</h3>
    <ul id="hardwarePrefsList"></ul>
  </div>

  <form action="https://formspree.io/f/xkodjqqo" method="POST" enctype="multipart/form-data">
    <label for="name">Name</label>
    <input type="text" id="name" name="name" required>

    <label for="phone">Phone</label>
    <input type="tel" id="phone" name="phone" required>

    <label for="email">Email</label>
    <input type="email" id="email" name="email">

    <label for="address">Project Address</label>
    <input type="text" id="address" name="address">

    <label for="project">Tell us about your project</label>
    <textarea id="project" name="project" placeholder="What are you looking to have installed? Include the sizes of rough openings if you have them, and attach any photos below that you'd like us to use for quoting purposes."></textarea>

    <label for="photo">Photo of your space (optional)</label>
    <input type="file" id="photo" name="photo" accept="image/*">

    <input type="hidden" name="liked_styles" id="likedStylesField">
    <input type="hidden" name="hardware_preferences" id="hardwarePrefsField">
    <button type="submit">Send My Estimate Request</button>
  </form>

  <p class="alt">Prefer to talk it through? <a href="tel:+17047501245">Call or text 704-750-1245</a></p>
</div>

<script>
function getSaved() {
  try { return JSON.parse(localStorage.getItem('lsd_saved') || '[]'); }
  catch(e) { return []; }
}
function getHardwarePrefs() {
  try { return JSON.parse(localStorage.getItem('lsd_hardware_prefs') || '{}'); }
  catch(e) { return {}; }
}
document.addEventListener('DOMContentLoaded', () => {
  const saved = getSaved();
  if (saved.length > 0) {
    const list = document.getElementById('savedPicksList');
    saved.forEach(s => {
      const li = document.createElement('li');
      li.textContent = s.label + (s.comment ? ' \u2014 "' + s.comment + '"' : '');
      list.appendChild(li);
    });
    document.getElementById('savedPicks').classList.add('show');
    document.getElementById('likedStylesField').value = saved.map(s => s.label + (s.comment ? ' (' + s.comment + ')' : '')).join('; ');
  }

  const prefs = getHardwarePrefs();
  const prefKeys = Object.keys(prefs);
  if (prefKeys.length > 0) {
    const list = document.getElementById('hardwarePrefsList');
    const labels = { hinge: 'Hinge & clamp style', handle: 'Handle style', glass: 'Glass type' };
    prefKeys.forEach(key => {
      const li = document.createElement('li');
      li.textContent = (labels[key] || key) + ': ' + prefs[key];
      list.appendChild(li);
    });
    document.getElementById('hardwarePrefs').classList.add('show');
    document.getElementById('hardwarePrefsField').value = prefKeys.map(k => (labels[k] || k) + ': ' + prefs[k]).join('; ');
  }
});
</script>
</body>
</html>
