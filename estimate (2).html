<div class="wrap">
  <h1>Request a Free Estimate</h1>
  <p>Send us a few details and a photo of your space. We&rsquo;ll follow up with a sample plan and pricing &mdash; no showroom visit required.</p>

  <div class="saved-picks" id="savedPicks">
    <h3>Styles you&rsquo;ve liked on our site:</h3>
    <ul id="savedPicksList"></ul>
  </div>

  <div class="saved-picks" id="hardwarePrefs">
    <h3>Your hardware preferences:</h3>
    <ul id="hardwarePrefsList"></ul>
  </div>

  <form action="https://formspree.io/f/xkodjqqo" method="POST" enctype="multipart/form-data">
    <label for="name">Name</label>
    <input type="text" id="name" name="name" required>

    <label for="phone">Phone</label>
    <input type="tel" id="phone" name="phone" required>

    <label for="email">Email</label>
    <input type="email" id="email" name="email">

    <label for="address">Project Address</label>
    <input type="text" id="address" name="address">

    <label for="project">Tell us about your project</label>
    <textarea id="project" name="project" placeholder="What are you looking to have installed?"></textarea>

    <label for="photo">Photo of your space (optional)</label>
    <input type="file" id="photo" name="photo" accept="image/*">

    <input type="hidden" name="liked_styles" id="likedStylesField">
    <input type="hidden" name="hardware_preferences" id="hardwarePrefsField">
    <input type="hidden" name="_next" value="thank-you.html">
    <button type="submit">Send My Estimate Request</button>
  </form>

  <p class="alt">Prefer to talk it through? <a href="tel:+17047501245">Call or text 704-750-1245</a></p>
</div>

<script>
function getSaved() {
  try { return JSON.parse(localStorage.getItem('lsd_saved') || '[]'); }
  catch(e) { return []; }
}
function getHardwarePrefs() {
  try { return JSON.parse(localStorage.getItem('lsd_hardware_prefs') || '{}'); }
  catch(e) { return {}; }
}
document.addEventListener('DOMContentLoaded', () => {
  const saved = getSaved();
  if (saved.length > 0) {
    const list = document.getElementById('savedPicksList');
    saved.forEach(s => {
      const li = document.createElement('li');
      li.textContent = s.label + (s.comment ? ' \u2014 "' + s.comment + '"' : '');
      list.appendChild(li);
    });
    document.getElementById('savedPicks').classList.add('show');
    document.getElementById('likedStylesField').value = saved.map(s => s.label + (s.comment ? ' (' + s.comment + ')' : '')).join('; ');
  }

  const prefs = getHardwarePrefs();
  const prefKeys = Object.keys(prefs);
  if (prefKeys.length > 0) {
    const list = document.getElementById('hardwarePrefsList');
    const labels = { hinge: 'Hinge & clamp style', handle: 'Handle style' };
    prefKeys.forEach(key => {
      const li = document.createElement('li');
      li.textContent = (labels[key] || key) + ': ' + prefs[key];
      list.appendChild(li);
    });
    document.getElementById('hardwarePrefs').classList.add('show');
    document.getElementById('hardwarePrefsField').value = prefKeys.map(k => (labels[k] || k) + ': ' + prefs[k]).join('; ');
  }
});
</script>
